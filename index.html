<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Speaking Gym – Convenience Store Drinks</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:           #0f172a;
      --bg2:          #1e293b;
      --bg3:          #334155;
      --accent:       #6366f1;
      --accent-light: #a5b4fc;
      --accent-glow:  rgba(99,102,241,.25);
      --green:        #10b981;
      --orange:       #f59e0b;
      --white:        #f8fafc;
      --muted:        #94a3b8;
      --border:       rgba(255,255,255,.08);
      --v-bg:         #f5f8fa;
      --v-blue:       #e0e7ff;
      --v-blue-mid:   #818cf8;
      --v-dark:       #1e293b;
      --v-gray:       #64748b;
      --v-green:      #d1fae5;
      --v-green-dark: #065f46;
    }
    body { font-family: -apple-system, 'Segoe UI', sans-serif; background: var(--bg); color: var(--white); overflow: hidden; height: 100vh; }

    /* ═══ HORIZONTAL (TEACHER) ═══ */
    #horiz-root { display: flex; width: 100vw; height: 100vh; }
    #horiz-root.hidden { display: none; }

    .h-left {
      width: 38%; min-width: 300px;
      background: var(--bg);
      display: flex; flex-direction: column;
      border-right: 1px solid var(--border);
      height: 100vh;
    }
    .h-top-bar {
      padding: 12px 18px;
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid var(--border); flex-shrink: 0;
    }
    .brand { font-size: 13px; font-weight: 700; letter-spacing: .05em; color: var(--accent-light); }
    .brand-sub { font-weight: 400; color: var(--muted); font-size: 11px; margin-top: 2px; }
    .layout-toggle {
      background: var(--bg3); border: none; color: var(--muted);
      font-size: 12px; padding: 5px 11px; border-radius: 8px; cursor: pointer; transition: .15s;
    }
    .layout-toggle:hover { background: var(--accent); color: #fff; }

    /* video centered vertically */
    .h-video-wrap {
      flex: 1; display: flex; flex-direction: column;
      align-items: stretch; justify-content: center; padding: 0 16px; gap: 14px;
    }
    .h-video-inner { border-radius: 14px; overflow: hidden; box-shadow: 0 8px 40px rgba(0,0,0,.55); }
    .h-video-inner iframe { width: 100%; aspect-ratio: 16/9; border: none; display: block; }

    /* stats below video */
    .h-stats { display: flex; gap: 10px; }
    .h-stat {
      flex: 1; background: var(--bg2); border-radius: 10px;
      padding: 10px 0; border: 1px solid var(--border); text-align: center;
    }
    .h-stat-num { font-size: 20px; font-weight: 800; }
    .h-stat-label { font-size: 9px; color: var(--muted); margin-top: 2px; letter-spacing: .06em; text-transform: uppercase; }

    .h-prog { }
    .h-prog-row { display: flex; justify-content: space-between; font-size: 11px; color: var(--muted); margin-bottom: 5px; }
    .h-prog-bar { height: 4px; background: var(--bg3); border-radius: 99px; overflow: hidden; }
    .h-prog-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent-light)); border-radius: 99px; transition: width .5s; }

    /* controls bottom */
    .h-controls {
      padding: 12px 16px 16px; display: flex; flex-direction: column; gap: 8px; flex-shrink: 0;
      border-top: 1px solid var(--border);
    }
    .h-tabs {
      display: flex; background: var(--bg2); border-radius: 9px;
      padding: 3px; gap: 3px; border: 1px solid var(--border);
    }
    .h-tab {
      flex: 1; padding: 7px 0; border: none; background: transparent;
      border-radius: 7px; font-size: 12px; font-weight: 600; color: var(--muted); cursor: pointer; transition: .15s;
    }
    .h-tab.active { background: var(--accent); color: #fff; box-shadow: 0 2px 8px var(--accent-glow); }
    .h-btn-row { display: flex; gap: 8px; }
    .h-btn {
      flex: 1; padding: 8px 0; border: none; border-radius: 9px;
      font-size: 12px; font-weight: 600; cursor: pointer; transition: .15s;
    }
    .h-btn.mode { background: rgba(245,158,11,.15); color: var(--orange); border: 1px solid rgba(245,158,11,.3); }
    .h-btn.mode.active { background: var(--orange); color: #000; }
    .h-btn.trans { background: rgba(16,185,129,.15); color: var(--green); border: 1px solid rgba(16,185,129,.3); }
    .h-btn.trans.active { background: var(--green); color: #fff; }

    /* right subs */
    .h-right { flex: 1; background: var(--bg2); overflow-y: auto; height: 100vh; display: flex; flex-direction: column; }
    .h-subs-header {
      padding: 14px 18px 10px; font-size: 10px; font-weight: 700;
      letter-spacing: .12em; color: var(--muted); border-bottom: 1px solid var(--border);
      text-transform: uppercase; flex-shrink: 0;
    }
    #subs-h { flex: 1; padding: 10px 12px 32px; display: flex; flex-direction: column; gap: 5px; }

    .sub-row-h { display: flex; align-items: flex-start; gap: 7px; border-radius: 12px; }
    .sub-row-h.playing { animation: glow-h 1.4s ease-in-out infinite; }
    @keyframes glow-h {
      0%,100% { box-shadow: none; }
      50% { box-shadow: 0 0 0 3px var(--accent-glow), 0 0 18px var(--accent-glow); }
    }
    .sub-btn-h {
      flex: 1; padding: 11px 15px; border-radius: 11px;
      border: 1px solid var(--border); background: var(--bg);
      color: var(--white); text-align: left; cursor: pointer; transition: .13s;
      line-height: 1.5; word-break: break-word;
    }
    .sub-btn-h:hover { background: var(--bg3); border-color: var(--accent); }
    .sub-row-h.selected .sub-btn-h { border-color: var(--accent); background: rgba(99,102,241,.12); }
    .sub-btn-h.learned { background: rgba(16,185,129,.1); border-color: rgba(16,185,129,.35); }
    .eng-h { display: block; font-size: 17px; font-weight: 500; }
    .sub-btn-h.learned .eng-h { color: var(--green); text-decoration: line-through; opacity: .7; }
    .kor-wrap-h { overflow: hidden; max-height: 0; transition: max-height .25s ease, margin-top .2s; }
    .kor-wrap-h.open { max-height: 60px; margin-top: 5px; }
    .kor-h { display: block; font-size: 13px; color: var(--muted); font-style: italic; padding-top: 5px; border-top: 1px solid var(--border); }
    .sub-btn-h.learned .kor-h { color: var(--green); }
    .sub-acts-h { display: flex; flex-direction: column; gap: 3px; flex-shrink: 0; }
    .act-h {
      width: 34px; height: 34px; font-size: 15px; border: none; background: transparent;
      cursor: pointer; border-radius: 8px; display: flex; align-items: center; justify-content: center;
      color: var(--muted); transition: .12s;
    }
    .act-h:hover { background: var(--bg3); color: var(--white); }
    .act-h.checked { color: var(--green); }
    .act-h.hide-on { background: var(--bg3); color: var(--white); }

    /* ═══ VERTICAL (STUDENT) ═══ */
    #vert-root {
      width: 100%; max-width: 460px; margin: 0 auto;
      display: flex; flex-direction: column;
      background: var(--v-bg); height: 100vh; overflow: hidden; color: var(--v-dark);
    }
    #vert-root.hidden { display: none; }

    .v-header {
      background: var(--v-dark); color: #fff; padding: 10px 16px;
      display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;
    }
    .v-brand { font-size: 13px; font-weight: 700; letter-spacing: .03em; }
    .v-brand span { opacity: .5; font-weight: 400; }
    .v-layout-btn {
      background: rgba(255,255,255,.12); border: none; color: #fff;
      font-size: 11px; padding: 4px 10px; border-radius: 7px; cursor: pointer;
    }

    .v-sticky { flex-shrink: 0; background: var(--v-bg); box-shadow: 0 3px 12px rgba(0,0,0,.06); }
    #player-vert { width: 100%; aspect-ratio: 16/9; border: none; display: block; background: #000; }

    .v-prog-area { padding: 10px 14px 6px; display: flex; align-items: center; gap: 12px; }
    .v-ring-wrap { position: relative; flex-shrink: 0; }
    .v-ring-wrap svg { transform: rotate(-90deg); }
    .v-ring-bg { fill: none; stroke: #e2e8f0; stroke-width: 4; }
    .v-ring-fill { fill: none; stroke: var(--v-blue-mid); stroke-width: 4; stroke-linecap: round; transition: stroke-dashoffset .5s ease; }
    .v-ring-text {
      position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 700; color: var(--v-blue-mid);
    }
    .v-prog-labels { flex: 1; min-width: 0; }
    .v-prog-title { font-size: 13px; font-weight: 700; color: var(--v-dark); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .v-prog-sub { font-size: 11px; color: var(--v-gray); margin-top: 2px; }

    .v-controls { padding: 6px 12px 10px; display: flex; flex-direction: column; gap: 6px; }
    .v-tabs { display: flex; background: #e8edf2; border-radius: 9px; padding: 2px; gap: 2px; }
    .v-tab { flex: 1; padding: 6px 0; border: none; background: transparent; border-radius: 7px; font-size: 12px; font-weight: 600; color: var(--v-gray); cursor: pointer; transition: .15s; }
    .v-tab.active { background: #fff; color: var(--v-dark); box-shadow: 0 1px 4px rgba(0,0,0,.1); }
    .v-btn-row { display: flex; gap: 6px; }
    .v-btn { flex: 1; padding: 7px 0; border: none; border-radius: 8px; font-size: 12px; font-weight: 600; cursor: pointer; transition: .15s; }
    .v-btn.mode  { background: #fed7aa; color: #c2410c; }
    .v-btn.mode.active { background: #c2410c; color: #fff; }
    .v-btn.trans { background: #d1fae5; color: #065f46; }
    .v-btn.trans.active { background: #065f46; color: #fff; }

    #subs-v { flex: 1; overflow-y: auto; padding: 8px 10px 24px; display: flex; flex-direction: column; gap: 7px; }
    .sub-row-v { display: flex; align-items: flex-start; gap: 6px; border-radius: 13px; }
    .sub-row-v.playing { animation: pulse-v 1.3s ease-in-out infinite; }
    @keyframes pulse-v { 0%,100% { box-shadow: none; } 50% { box-shadow: 0 0 0 4px rgba(129,140,248,.22); } }
    .sub-btn-v {
      flex: 1; padding: 11px 13px; border-radius: 13px;
      border: 2px solid transparent; background: var(--v-blue);
      color: var(--v-dark); text-align: left; cursor: pointer; transition: .13s;
      line-height: 1.5; word-break: break-word;
    }
    .sub-row-v.selected .sub-btn-v { border-color: var(--v-blue-mid); }
    .sub-btn-v:active { background: #a5b4fc; }
    .sub-btn-v.learned { background: var(--v-green); }
    .eng-v { display: block; font-size: 15px; color: var(--v-dark); }
    .sub-btn-v.learned .eng-v { color: var(--v-green-dark); text-decoration: line-through; }
    .kor-wrap-v { overflow: hidden; max-height: 0; transition: max-height .25s ease, margin-top .2s; }
    .kor-wrap-v.open { max-height: 60px; margin-top: 5px; }
    .kor-v { display: block; font-size: 12px; color: var(--v-gray); font-style: italic; padding-top: 4px; border-top: 1px solid #c7d2fe; }
    .sub-btn-v.learned .kor-v { color: #34d399; border-top-color: #6ee7b7; }
    .sub-acts-v { display: flex; flex-direction: column; gap: 3px; flex-shrink: 0; }
    .act-v { width: 36px; height: 36px; font-size: 17px; display: flex; align-items: center; justify-content: center; background: transparent; border: none; cursor: pointer; border-radius: 9px; transition: .12s; }
    .act-v:hover { background: #e2e8f0; }
    .act-v.checked { color: #22c55e; }
    .act-v.hide-on { background: #e2e8f0; color: #475569; }

    @media (max-width: 520px) { #vert-root { max-width: 100vw; } }
  </style>
</head>
<body>

<!-- HORIZONTAL (TEACHER) -->
<div id="horiz-root" class="hidden">
  <div class="h-left">
    <div class="h-top-bar">
      <div>
        <div class="brand">🏋️ Speaking Gym</div>
        <div class="brand-sub">with Noah · Convenience Store Drinks</div>
      </div>
      <button class="layout-toggle" id="h-layout-btn">📱 세로모드</button>
    </div>
    <div class="h-video-wrap">
      <div class="h-video-inner">
        <iframe id="player-h" src="https://www.youtube.com/embed/hZzckey5frk?enablejsapi=1" allow="autoplay; encrypted-media" allowfullscreen></iframe>
      </div>
      <div class="h-stats">
        <div class="h-stat"><div class="h-stat-num" id="h-total-num">63</div><div class="h-stat-label">Total</div></div>
        <div class="h-stat"><div class="h-stat-num" id="h-learned-num" style="color:var(--green)">0</div><div class="h-stat-label">Learned</div></div>
        <div class="h-stat"><div class="h-stat-num" id="h-pct" style="color:var(--orange)">0%</div><div class="h-stat-label">Progress</div></div>
      </div>
      <div class="h-prog">
        <div class="h-prog-row"><span>학습 진행률</span><span id="h-prog-text">0 / 63</span></div>

    <div class="h-controls">

        <button class="h-tab" id="h-show-learned">✔ 외웠음만</button>

      <div class="h-btn-row">

    <div id="subs-h"></div>
  </div>
</div>

<!-- VERTICAL (STUDENT) -->
<div id="vert-root">
  <div class="v-header">
    <div class="v-brand">🏋️ Speaking Gym <span>with Noah</span></div>
    <button class="v-layout-btn" id="v-layout-btn">🖥 가로모드</button>
  </div>
  <div class="v-sticky">
    <iframe id="player-vert" src="https://www.youtube.com/embed/hZzckey5frk?enablejsapi=1" allow="autoplay; encrypted-media" allowfullscreen></iframe>
    <div class="v-prog-area">
      <div class="v-ring-wrap">
        <svg width="44" height="44" viewBox="0 0 44 44">
          <circle class="v-ring-bg" cx="22" cy="22" r="18"/>
          <circle class="v-ring-fill" id="v-ring" cx="22" cy="22" r="18" stroke-dasharray="113.1" stroke-dashoffset="113.1"/>
        </svg>
        <div class="v-ring-text" id="v-ring-text">0%</div>
      </div>
      <div class="v-prog-labels">
        <div class="v-prog-title">Convenience Store Drinks</div>
        <div class="v-prog-sub" id="v-prog-sub">0 / 63 문장 완료</div>
      </div>
    </div>
    <div class="v-controls">
      <div class="v-tabs">
        <button class="v-tab active" id="v-show-all">전체 보기</button>
        <button class="v-tab" id="v-show-learned">✔ 외웠음만</button>
      </div>
      <div class="v-btn-row">
        <button class="v-btn mode" id="v-mode-btn">▶ 한줄 재생</button>
        <button class="v-btn trans" id="v-trans-btn">🇰🇷 번역 보기</button>
      </div>
    </div>
  </div>
  <div id="subs-v"></div>
</div>

<script>
const SUBS=[{start:16.716,end:20.72,text:"Good morning, Doobies Welcome to Convee Convo",kor:"안녕하세요 여러분, Convee Convo에 오신 걸 환영해요"},{start:20.72,end:23.39,text:"where we mix a little bit of everything",kor:"이것저것 다양한 걸 섞는 곳이죠"},{start:23.39,end:26.726,text:"Today's guest, he is the master of brunch talk",kor:"오늘의 게스트는 브런치 토크의 대가예요"},{start:26.726,end:28.495,text:"The master of aesthetics",kor:"미적 감각의 장인이죠"},{start:28.528,end:32.065,text:"Please welcome Nigel, aka SimplyNi",kor:"Nigel, 일명 SimplyNi를 환영해 주세요"},{start:54.954,end:56.384,text:"I'm going to pretend that camera is your mom",kor:"저 카메라가 네 엄마라고 생각할게"},{start:56.395,end:57.223,text:"Is she here by the way?",kor:"근데 엄마 여기 계세요?"},{start:60.46,end:61.461,text:"My mom is gorgeous",kor:"우리 엄마 너무 예뻐요"},{start:61.461,end:62.429,text:"She's stunning",kor:"정말 눈부시게 아름다우세요"},{start:62.429,end:63.797,text:"She's going to be very happy",kor:"엄마가 엄청 좋아하실 거예요"},{start:63.797,end:64.798,text:"The queen",kor:"여왕님이죠"},{start:64.798,end:66.299,text:"I hope she's having a great day",kor:"오늘 하루도 좋은 하루 보내고 계시길"},{start:66.299,end:69.269,text:"She's having the most great morning",kor:"최고의 아침을 보내고 계실 거예요"},{start:69.269,end:69.869,text:"Mommy, sorry",kor:"엄마, 미안해요"},{start:71.304,end:72.972,text:"I'm dying",kor:"나 죽겠다 (너무 웃겨)"},{start:72.972,end:74.219,text:"My mom loves your videos",kor:"우리 엄마가 당신 영상을 너무 좋아해요"},{start:74.23,end:74.741,text:"Does she?",kor:"그래요?"},{start:74.741,end:76.809,text:"Yeah, I show her all the time",kor:"네, 항상 보여드려요"},{start:76.82,end:77.444,text:"Sorry",kor:"죄송해요"},{start:78.978,end:82.148,text:"I actually get more people asking about my mom than",kor:"사실 나보다 엄마에 대해 물어보는 사람이 더 많아요"},{start:82.148,end:84.717,text:"maybe like oh like I want to see your mom's toes",kor:"엄마 발가락 보고 싶다는 사람도 있고요"},{start:86.519,end:87.854,text:"She is fine",kor:"엄마 진짜 매력 있으세요"},{start:87.854,end:89.255,text:"She's really aged well",kor:"나이를 정말 잘 드셨어요"},{start:89.255,end:91.283,text:"Remember when the internet was obsessed with your feet?",kor:"인터넷이 당신 발에 집착했던 거 기억해요?"},{start:91.294,end:92.692,text:"We need to talk about that at one point",kor:"그건 언젠가 꼭 얘기해야 해요"},{start:92.692,end:94.16,text:"That's a whole other conversation",kor:"그건 완전히 다른 주제예요"},{start:94.16,end:96.329,text:"You want to see my socks today?",kor:"오늘 제 양말 보고 싶어요?"},{start:96.329,end:97.53,text:"Actually, are they dirty?",kor:"근데 혹시 더럽지 않나요?"},{start:97.53,end:98.998,text:"They're a little dirty and sweaty",kor:"좀 더럽고 땀에 젖었어요"},{start:98.998,end:100.733,text:"But I'm wearing tabi socks today",kor:"그래도 오늘 타비 양말 신었어요"},{start:100.733,end:102.001,text:"Oh my God",kor:"세상에"},{start:102.001,end:103.503,text:"That's so funny",kor:"너무 웃겨요"},{start:103.503,end:104.37,text:"I love them",kor:"완전 마음에 들어요"},{start:104.37,end:106.84,text:"Honestly, it's like you can grab things",kor:"솔직히 발가락으로 물건을 잡을 수 있을 것 같잖아요"},{start:106.84,end:108.007,text:"Okay, I'm not going to do that",kor:"아, 그러진 않을게요"},{start:108.007,end:109.909,text:"This is a whole different genre",kor:"이건 완전히 다른 장르네요"},{start:109.909,end:112.846,text:"Okay, we got to keep this PG",kor:"자, 수위 조절해야겠어요"},{start:118.518,end:120.92,text:"Good morning",kor:"좋은 아침이에요"},{start:123.59,end:125.558,text:"Getting a brunch club",kor:"브런치 클럽 시작이에요"},{start:125.558,end:126.359,text:"Okay",kor:"자"},{start:126.359,end:128.928,text:"So since you say 'Good Morning' in your videos",kor:"영상에서 항상 '굿모닝'이라고 하시니까"},{start:128.928,end:130.93,text:"we are going to be serving you",kor:"이걸 드려볼게요"},{start:130.93,end:132.365,text:"this drink over here",kor:"바로 이 음료인데요"},{start:132.365,end:134.734,text:"which is called 'Achim Haetsal'",kor:"'아침 햇살'이라는 음료예요"},{start:134.734,end:137.203,text:"and it just translates to 'Morning Sunshine'",kor:"딱 'Morning Sunshine'이라는 뜻이에요"},{start:137.203,end:138.338,text:"Oh really, amazing",kor:"오 정말요, 대박이다"},{start:138.338,end:142.408,text:"It's made from like washed rice and a bunch of different grain mixtures",kor:"씻은 쌀이랑 여러 가지 곡물을 섞어서 만든 거예요"},{start:142.408,end:143.877,text:"It's like cozy",kor:"뭔가 아늑한 느낌이에요"},{start:143.877,end:145.979,text:"Has that really nice malty flavor",kor:"구수한 맥아 맛이 정말 좋아요"},{start:145.979,end:147.814,text:"- You want to give it a try? Just as is? - Absolutely",kor:"- 한번 드셔볼래요? 그냥 그대로요? - 물론이죠"},{start:176.176,end:178.958,text:"You can taste kind of the really subtleness",kor:"정말 은은한 맛이 느껴지죠"},{start:178.969,end:183.249,text:"and how the flavors are melting in your mouth, you know?",kor:"풍미가 입 안에서 녹아드는 느낌 있잖아요?"},{start:184.284,end:188.021,text:"Also I'll keep doing this and I hope you don't find it weird",kor:"그리고 저 이렇게 계속 할 건데 이상하게 보지 않으셨으면 해요"},{start:188.021,end:192.158,text:"You know, our nose has more of a flavor profile than our tongue",kor:"사실 혀보다 코가 맛을 더 많이 느끼거든요"},{start:192.158,end:194.227,text:"So I tend to always smell things",kor:"그래서 저는 항상 냄새를 맡는 편이에요"},{start:194.227,end:195.962,text:"I smell everything too",kor:"저도 뭐든 냄새 맡아요"},{start:196.729,end:199.465,text:"Kevin always teases me but even when I'm like...",kor:"Kevin이 항상 놀리는데 저도 이럴 때가 있어요..."},{start:200.2,end:201.868,text:"I don't know if I should say this",kor:"이걸 말해도 될지 모르겠는데"},{start:201.868,end:203.703,text:"I'm like, on the edge of my seat",kor:"저 지금 엄청 기대되는데요"},{start:203.703,end:205.171,text:"Yeah, I know like after I...",kor:"맞아요, 저도 있어요..."},{start:205.171,end:206.339,text:"Okay, I'm sure",kor:"맞아요, 확실해요"},{start:206.339,end:208.074,text:"I'm not singular in this.",kor:"저만 그런 건 아닐 거예요"},{start:208.074,end:209.642,text:"After I pop a pimple",kor:"여드름을 짜고 나면"},{start:209.642,end:212.679,text:"I cannot resist not smelling it",kor:"냄새 안 맡을 수가 없어요"},{start:212.679,end:214.514,text:"I'm ashamed to say I do it too",kor:"부끄럽지만 저도 그래요"}];

const STORAGE_KEY='sg_convenience_v3';
let status={},showKorean=false,openKorIdxs=new Set(),layoutMode='vertical';
let playingSubIdx=null,pausedSubIdx=null,paused=false,playMode='single';
let timeoutId=null,playerH=null,playerVert=null,currentView='all',selectedSubIdx=null;

function loadStatus(){
  try{const s=JSON.parse(localStorage.getItem(STORAGE_KEY))||{};status=s.status||{};for(let i=0;i<SUBS.length;i++)if(!status[i])status[i]={hide:false,learned:false};}
  catch{status={};}
}
function saveStatus(){localStorage.setItem(STORAGE_KEY,JSON.stringify({status}));}

function countLearned(){return Object.values(status).filter(s=>s.learned).length;}
function updateStats(){
  const learned=countLearned(),total=SUBS.length,pct=total?Math.round(learned/total*100):0;
  const set=(id,v)=>{const el=document.getElementById(id);if(el)el.textContent=v;};
  const setW=(id,v)=>{const el=document.getElementById(id);if(el)el.style.width=v;};
  set('h-learned-num',learned);set('h-pct',pct+'%');setW('h-prog-fill',pct+'%');set('h-prog-text',learned+' / '+total);
  const circ=2*Math.PI*18;
  const ring=document.getElementById('v-ring');
  if(ring)ring.style.strokeDashoffset=circ*(1-pct/100);
  set('v-ring-text',pct+'%');set('v-prog-sub',learned+' / '+total+' 문장 완료');
}

function renderSubs(view='all',mode='vertical'){
  const isH=mode==='horizontal';
  const subsDiv=document.getElementById(isH?'subs-h':'subs-v');
  subsDiv.innerHTML='';
  SUBS.forEach((sub,idx)=>{
    if(view==='learned'&&!status[idx].learned)return;
    const row=document.createElement('div');
    row.className=(isH?'sub-row-h':'sub-row-v')+(idx===selectedSubIdx?' selected':'')+(idx===playingSubIdx?' playing':'');
    row.dataset.idx=idx;
    const btn=document.createElement('button');
    btn.className=(isH?'sub-btn-h':'sub-btn-v')+(status[idx].learned?' learned':'');
    const eng=document.createElement('span');
    eng.className=isH?'eng-h':'eng-v';
    eng.textContent=status[idx].hide?'🙈':sub.text;
    btn.appendChild(eng);
    const kw=document.createElement('span');
    kw.className=(isH?'kor-wrap-h':'kor-wrap-v')+(openKorIdxs.has(idx)?' open':'');
    const ks=document.createElement('span');
    ks.className=isH?'kor-h':'kor-v';
    if(showKorean)ks.textContent=sub.kor||'';
    kw.appendChild(ks);btn.appendChild(kw);
    btn.onclick=()=>{
      if(showKorean&&!status[idx].hide){if(openKorIdxs.has(idx))openKorIdxs.delete(idx);else openKorIdxs.add(idx);}
      playPauseOrRestartSub(idx,mode);
    };
    const acts=document.createElement('div');
    acts.className=isH?'sub-acts-h':'sub-acts-v';
    const hb=document.createElement('button');
    hb.className=(isH?'act-h':'act-v')+(status[idx].hide?' hide-on':'');
    hb.textContent='🙈';
    hb.onclick=e=>{e.stopPropagation();status[idx].hide=!status[idx].hide;saveStatus();renderSubs(currentView,mode);updateStats();};
    const cb=document.createElement('button');
    cb.className=(isH?'act-h':'act-v')+(status[idx].learned?' checked':'');
    cb.textContent='✔️';
    cb.onclick=e=>{e.stopPropagation();status[idx].learned=!status[idx].learned;saveStatus();renderSubs(currentView,mode);updateStats();};
    acts.appendChild(hb);acts.appendChild(cb);row.appendChild(btn);row.appendChild(acts);subsDiv.appendChild(row);
  });
  updateStats();
}

function scrollToSub(idx,mode){
  const d=document.getElementById(mode==='horizontal'?'subs-h':'subs-v');
  for(const r of d.querySelectorAll('[data-idx]')){
    if(parseInt(r.dataset.idx)===idx){r.scrollIntoView({behavior:'smooth',block:'center'});break;}
  }
}

function toggleTranslate(mode){
  showKorean=!showKorean;
  if(!showKorean)openKorIdxs.clear();
  const label=showKorean?'🇰🇷 번역 숨기기':'🇰🇷 번역 보기';
  ['h-trans-btn','v-trans-btn'].forEach(id=>{const b=document.getElementById(id);if(!b)return;b.textContent=label;b.classList.toggle('active',showKorean);});
  renderSubs(currentView,mode);
}

function getCurPlayer(mode){return mode==='horizontal'?playerH:playerVert;}
function playPauseOrRestartSub(idx,mode){
  selectedSubIdx=idx;
  const cp=getCurPlayer(mode);
  if(!cp?.seekTo){renderSubs(currentView,mode);return;}
  const state=cp.getPlayerState();
  if(playingSubIdx!==idx){startPlay(idx,mode);return;}
  if(state===1){cp.pauseVideo();if(timeoutId)clearTimeout(timeoutId);paused=true;pausedSubIdx=idx;playingSubIdx=null;renderSubs(currentView,mode);return;}
  if(state===2&&paused&&pausedSubIdx===idx){startPlay(idx,mode);return;}
  startPlay(idx,mode);
}
function startPlay(idx,mode){
  playingSubIdx=idx;paused=false;pausedSubIdx=null;
  renderSubs(currentView,mode);scrollToSub(idx,mode);
  const cp=getCurPlayer(mode);
  const start=SUBS[idx].start;
  const end=playMode==='single'?SUBS[idx].end:(SUBS[idx+1]?.end??SUBS[idx].end);
  cp.seekTo(start,true);cp.playVideo();
  if(timeoutId)clearTimeout(timeoutId);
  timeoutId=setTimeout(()=>{cp.pauseVideo();playingSubIdx=null;renderSubs(currentView,mode);},(end-start)*1000);
}

function setLayout(newMode){
  layoutMode=newMode;
  document.getElementById('horiz-root').classList.toggle('hidden',newMode!=='horizontal');
  document.getElementById('vert-root').classList.toggle('hidden',newMode==='horizontal');
  renderSubs(currentView,newMode);
}

function syncModeBtns(){
  const label=playMode==='single'?'▶ 한줄 재생':'▶▶ 다음줄까지';
  ['h-mode-btn','v-mode-btn'].forEach(id=>{const b=document.getElementById(id);if(!b)return;b.textContent=label;b.classList.toggle('active',playMode==='next');});
}

function setHandlers(){
  document.getElementById('h-layout-btn').onclick=()=>setLayout('vertical');
  document.getElementById('v-layout-btn').onclick=()=>setLayout('horizontal');
  document.getElementById('h-show-all').onclick=function(){currentView='all';this.classList.add('active');document.getElementById('h-show-learned').classList.remove('active');renderSubs('all','horizontal');};
  document.getElementById('h-show-learned').onclick=function(){currentView='learned';this.classList.add('active');document.getElementById('h-show-all').classList.remove('active');renderSubs('learned','horizontal');};
  document.getElementById('v-show-all').onclick=function(){currentView='all';this.classList.add('active');document.getElementById('v-show-learned').classList.remove('active');renderSubs('all','vertical');};
  document.getElementById('v-show-learned').onclick=function(){currentView='learned';this.classList.add('active');document.getElementById('v-show-all').classList.remove('active');renderSubs('learned','vertical');};
  document.getElementById('h-mode-btn').onclick=()=>{playMode=playMode==='single'?'next':'single';syncModeBtns();};
  document.getElementById('v-mode-btn').onclick=()=>{playMode=playMode==='single'?'next':'single';syncModeBtns();};
  document.getElementById('h-trans-btn').onclick=()=>toggleTranslate('horizontal');
  document.getElementById('v-trans-btn').onclick=()=>toggleTranslate('vertical');
}

function onYouTubeIframeAPIReady(){playerH=new YT.Player('player-h');playerVert=new YT.Player('player-vert');}
window.onYouTubeIframeAPIReady=onYouTubeIframeAPIReady;

window.onload=function(){
  loadStatus();setHandlers();setLayout('vertical');updateStats();
  const tag=document.createElement('script');tag.src='https://www.youtube.com/iframe_api';document.body.appendChild(tag);
};
</script>
</body>
</html>
